<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Blueprint - Zine</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/zine/zine2.css">
</head>
<body>
  <header class="nav-header">
    <div class="header-left">
      <a href="../index.html" class="logo">The Blueprint</a>
    </div>
    <nav class="header-nav">
      <a href="../index.html" class="nav-btn">Submission</a>
      <a href="../team.html" class="nav-btn">Our Team</a>
      <a href="../zine.html" class="nav-btn">Zine (Spring 2026)</a>
    </nav>
  </header>
  
  <section class="magazine-container">
    <h1>Digital Magazine - Version 2</h1>
    
    <div class="magazine-viewer">
      <div class="magazine-pages">
        <div class="page-frame left-page">
          <img id="leftImage" src="../assets/images/1.jpg" alt="Magazine page left">
          <p class="page-number" id="leftPageNum">Page 1</p>
        </div>
        <div class="page-frame right-page">
          <img id="rightImage" src="../assets/images/2.jpg" alt="Magazine page right">
          <p class="page-number" id="rightPageNum">Page 2</p>
        </div>
      </div>
    </div>
    
    <div class="magazine-controls">
      <button id="prevBtn" class="page-btn prev-btn">←</button>
      <button id="nextBtn" class="page-btn next-btn">→</button>
    </div>
  </section>

  <section class="footer">
    <p>© The Blueprint 2026</p>
    <a href="../playground.html" id="playground-btn">.</a>
  </section>

  <script src="../assets/js/magazine.js"></script>
</body>
</html>
